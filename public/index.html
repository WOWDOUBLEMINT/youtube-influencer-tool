<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Influencer Scout — YouTube search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://twotrees3d.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #fde2ec;
        --page-bg2: #fce4f0;
        --ink: #0a0a0a;
        --muted: #4a4a4a;
        --card: #ffffff;
        --stroke: rgba(15, 23, 42, 0.08);
        --accent: #111111;
        --accent-soft: #f4f4f5;
        --danger: #be123c;
        --ok: #047857;
        --pill: #0a0a0a;
        --nav-border: rgba(255, 255, 255, 0.1);
        --nav-text: #f8fafc;
        --nav-muted: rgba(248, 250, 252, 0.65);
        --radius: 20px;
        --nav-h: 56px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'DM Sans', system-ui, sans-serif;
        color: var(--ink);
        background: var(--page-bg);
        background-image: radial-gradient(1200px 600px at 50% -10%, rgba(255, 255, 255, 0.65), transparent 55%),
          radial-gradient(900px 500px at 100% 40%, rgba(253, 186, 210, 0.45), transparent 50%),
          radial-gradient(700px 400px at 0% 80%, rgba(233, 213, 255, 0.35), transparent 45%);
      }

      .nav-shell {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 18px 16px 0;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      .nav-pill {
        pointer-events: auto;
        width: min(960px, calc(100% - 8px));
        min-height: var(--nav-h);
        padding: 8px 10px 8px 12px;
        background: var(--pill);
        border-radius: 999px;
        border: 1px solid var(--nav-border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 2px 12px rgba(0, 0, 0, 0.25);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 8px;
      }

      .nav-left {
        justify-self: start;
        display: flex;
        align-items: center;
      }

      .nav-center {
        justify-self: center;
      }

      .nav-right {
        justify-self: end;
        padding-right: 6px;
      }

      .nav-logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border-radius: 14px;
        padding: 6px 10px 6px 4px;
        line-height: 0;
      }

      .nav-logo-link {
        border-radius: 10px;
        outline-offset: 3px;
      }

      .nav-logo-link:focus-visible {
        outline: 2px solid rgba(96, 165, 250, 0.95);
      }

      .nav-logo {
        height: 26px;
        width: auto;
        max-width: min(160px, 36vw);
        object-fit: contain;
        object-position: left center;
        display: block;
      }

      @media (min-width: 480px) {
        .nav-logo {
          height: 30px;
          max-width: 180px;
        }
      }

      .nav-home {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--nav-text);
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 999px;
        transition: background 0.2s;
      }

      .nav-home:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .lang-toggle {
        display: inline-flex;
        padding: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--nav-border);
        gap: 2px;
      }

      .lang-btn {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.78rem;
        padding: 8px 12px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        background: transparent;
        color: var(--nav-muted);
        transition: background 0.2s, color 0.2s;
      }

      .lang-btn:hover {
        color: var(--nav-text);
      }

      .lang-btn.active {
        background: #fff;
        color: #0a0a0a;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .hero {
        min-height: 90vh;
        min-height: 90dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: calc(var(--nav-h) + 48px) 22px 48px;
        position: relative;
        overflow: hidden;
      }

      .hero-deco {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .hero-pill {
        position: absolute;
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 8px 14px;
        border-radius: 999px;
        color: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      .hero-pill--a {
        top: 22%;
        left: 8%;
        background: linear-gradient(135deg, #7c3aed, #5b21b6);
        transform: rotate(-8deg);
      }

      .hero-pill--b {
        top: 28%;
        right: 10%;
        background: linear-gradient(135deg, #db2777, #9d174d);
        transform: rotate(6deg);
      }

      .hero-pill--c {
        bottom: 38%;
        left: 14%;
        background: linear-gradient(135deg, #ea580c, #c2410c);
        transform: rotate(5deg);
      }

      @media (max-width: 640px) {
        .hero-pill {
          display: none;
        }
      }

      .hero-title {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(2.1rem, 7vw, 4.25rem);
        line-height: 0.98;
        letter-spacing: -0.03em;
        text-transform: uppercase;
        color: var(--ink);
        margin: 0;
        max-width: 20ch;
        position: relative;
        z-index: 1;
        white-space: pre-line;
      }

      @media (min-width: 768px) {
        .hero-title {
          max-width: 24ch;
          font-size: clamp(2.75rem, 6.5vw, 4.6rem);
        }
      }

      .hero-sub {
        margin: 28px 0 0;
        max-width: 36rem;
        font-size: clamp(0.95rem, 2.1vw, 1.15rem);
        line-height: 1.65;
        color: var(--muted);
        font-weight: 500;
        position: relative;
        z-index: 1;
      }

      .hero-scroll {
        margin-top: 40px;
        position: relative;
        z-index: 1;
      }

      .hero-scroll-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink);
        text-decoration: none;
        padding: 14px 26px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        transition: transform 0.15s, box-shadow 0.2s;
      }

      .hero-scroll-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.22);
      }

      .hero-scroll-link:active {
        transform: translateY(0);
      }

      .search-panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.92) 12%, #fff 100%);
        border-radius: 32px 32px 0 0;
        border-top: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 -20px 60px rgba(15, 23, 42, 0.06);
        padding: 48px 0 72px;
        margin-top: -8px;
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 22px;
      }

      .panel-title {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(1.35rem, 3vw, 1.75rem);
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        color: var(--ink);
      }

      .panel-lead {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0 0 28px;
        max-width: 40rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.05);
        padding: 26px 26px 22px;
        margin-bottom: 22px;
      }

      label {
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 700;
      }

      input[type='text'] {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fafafa;
        color: var(--ink);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus {
        border-color: var(--ink);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }

      .search-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: flex-end;
      }

      .search-row .grow {
        flex: 1;
        min-width: min(100%, 240px);
      }

      .search-row .actions {
        margin-top: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        border: none;
        border-radius: 999px;
        padding: 13px 26px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--ink);
        color: #fff;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      }

      .btn-primary:hover:not(:disabled) {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      }

      .btn-ghost {
        background: #fff;
        color: var(--ink);
        border: 1px solid rgba(15, 23, 42, 0.12);
      }

      .btn-ghost:hover:not(:disabled) {
        background: #f4f4f5;
      }

      .btn-export {
        background: linear-gradient(135deg, #047857, #0d9488);
        color: #fff;
      }

      .btn-export:hover:not(:disabled) {
        box-shadow: 0 4px 14px rgba(4, 120, 87, 0.35);
      }

      .btn-sm {
        padding: 8px 16px;
        font-size: 0.85rem;
      }

      .msg {
        margin-top: 12px;
        font-size: 0.9rem;
        min-height: 1.2em;
      }

      .msg.err {
        color: var(--danger);
      }

      .msg.ok {
        color: var(--ok);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 0.8rem;
        color: var(--muted);
        border: 1px solid var(--stroke);
        background: #fafafa;
      }

      .badge strong {
        color: var(--ink);
        font-weight: 800;
      }

      .badges-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .list-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        padding: 12px 14px;
        background: #fafafa;
        border: 1px solid var(--stroke);
        border-radius: 14px;
      }

      .list-toolbar-left {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 18px;
      }

      .filter-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        color: var(--ink);
        cursor: pointer;
        user-select: none;
      }

      .filter-label input {
        width: 16px;
        height: 16px;
        accent-color: var(--ink);
      }

      .pager-below {
        display: flex;
        justify-content: center;
        margin-top: 16px;
      }

      .pager {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .page-meta {
        font-size: 0.88rem;
        color: var(--muted);
        min-width: 8rem;
        text-align: center;
      }

      .list-muted {
        font-size: 0.82rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .table-scroll {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--stroke);
        border-radius: 14px;
        background: #fff;
      }

      table.result-table {
        table-layout: fixed;
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      table.result-table th,
      table.result-table td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--stroke);
        vertical-align: middle;
      }

      table.result-table th {
        color: var(--muted);
        font-weight: 700;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: #fafafa;
      }

      tbody tr:hover {
        background: #fafafa;
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      .cell-clip {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }

      table.result-table td a.cell-link {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        word-break: normal;
      }

      .hidden {
        display: none !important;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #e5e7eb;
        border-top-color: var(--ink);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .results-head {
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <header class="nav-shell">
      <nav class="nav-pill" aria-label="Main navigation">
        <div class="nav-left">
          <a class="nav-logo-link" href="#hero" title="Two Trees">
            <span class="nav-logo-wrap">
              <img
                class="nav-logo"
                src="https://twotrees3d.com/cdn/shop/files/logo_1c806b7f-262b-463d-826b-790ffb4882b4.png?v=1751007669&amp;width=500"
                width="200"
                height="54"
                alt="Two Trees"
                decoding="async"
                fetchpriority="high"
              />
            </span>
          </a>
        </div>
        <div class="nav-center">
          <a class="nav-home" href="#hero" data-i18n="navHome">Home</a>
        </div>
        <div class="nav-right">
          <div class="lang-toggle" role="group" aria-label="Language">
            <button type="button" class="lang-btn active" data-set-lang="en" id="langEn">EN</button>
            <button type="button" class="lang-btn" data-set-lang="zh" id="langZh">中文</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero" id="hero">
        <div class="hero-deco" aria-hidden="true">
          <span class="hero-pill hero-pill--a">Creator</span>
          <span class="hero-pill hero-pill--b">Scout</span>
          <span class="hero-pill hero-pill--c">Growth</span>
        </div>
        <h1 class="hero-title" data-i18n="heroTitle"></h1>
        <p class="hero-sub" data-i18n="heroSub"></p>
        <div class="hero-scroll">
          <a class="hero-scroll-link" href="#search" data-i18n="scrollToSearch">Scroll to search</a>
        </div>
      </section>

      <section class="search-panel" id="search">
        <div class="wrap">
          <h2 class="panel-title" data-i18n="panelTitle">Search</h2>
          <!-- <p class="panel-lead" data-i18n="panelLead"></p> -->

          <div class="card">
            <div class="search-row">
              <div class="grow">
                <label for="keyword" data-i18n="labelKeyword">Keyword</label>
                <input type="text" id="keyword" autocomplete="off" data-i18n-placeholder="phKeyword" />
              </div>
              <div class="actions">
                <button type="button" class="btn-primary" id="btnSearch" data-i18n="btnSearch">Search</button>
              </div>
            </div>
            <div class="msg" id="searchMsg"></div>
          </div>

          <div class="card hidden" id="resultsCard">
            <div class="results-head">
              <div class="badges-row">
                <span class="badge"><span data-i18n="badgeKw">Keyword</span> <strong id="kwDisplay"></strong></span>
                <span class="badge"
                  ><span data-i18n="badgeTotal">Total</span> <strong id="countDisplay">0</strong>
                  <span data-i18n="badgeVideos">videos</span></span
                >
                <span class="badge hidden" id="badgeFiltered"
                  ><strong id="filteredCount">0</strong> <span data-i18n="badgeFiltered">with email (list)</span></span
                >
              </div>
              <div class="list-toolbar">
                <div class="list-toolbar-left">
                  <label class="filter-label"
                    ><input type="checkbox" id="filterEmail" /> <span data-i18n="filterEmail">Email only</span></label
                  >
                  <label class="filter-label"
                    ><input type="checkbox" id="exportEmailOnly" />
                    <span data-i18n="exportEmailOnly">Export rows with email only</span></label
                  >
                  <span class="list-muted" id="emailSummary"></span>
                  <button type="button" class="btn-export btn-sm" id="btnExport" data-i18n="btnExport">
                    Export Excel
                  </button>
                </div>
              </div>
            </div>
            <div class="table-scroll">
              <table class="result-table">
                <colgroup>
                  <col style="width: 24%" />
                  <col style="width: 18%" />
                  <col style="width: 12%" />
                  <col style="width: 18%" />
                  <col style="width: 16%" />
                  <col style="width: 12%" />
                </colgroup>
                <thead>
                  <tr>
                    <th data-i18n="colVideo">Video title</th>
                    <th data-i18n="colVideoUrl">Video URL</th>
                    <th data-i18n="colChannel">Channel</th>
                    <th data-i18n="colChannelUrl">Channel page</th>
                    <th data-i18n="colEmail">Public email</th>
                    <th data-i18n="colSubs">Subscribers</th>
                  </tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
            <div class="pager-below">
              <div class="pager">
                <button type="button" class="btn-ghost btn-sm" id="btnPrevPage" data-i18n="btnPrev">Previous</button>
                <span class="page-meta" id="pageMeta">Page 1 / 1</span>
                <button type="button" class="btn-ghost btn-sm" id="btnNextPage" data-i18n="btnNext">Next</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>

          badgeVideos: '条视频',
          badgeFiltered: '条含邮箱（当前列表）',
          filterEmail: '仅显示有邮箱的',
          exportEmailOnly: '导出时仅包含有邮箱的',
          btnExport: '导出 Excel',
          colVideo: '视频标题',
          colVideoUrl: '视频链接',
          colChannel: '频道',
          colChannelUrl: '频道主页',
          colEmail: '公开邮箱',
          colSubs: '粉丝数',
          btnPrev: '上一页',
          btnNext: '下一页',
          errNeedKeyword: '请输入关键词',
          searching: '正在搜索视频（结果较多时可能需要较长时间）…',
          done: '检索完成',
          errSearch: '搜索失败',
          errNoExportEmail: '没有含邮箱的记录可导出',
          errNoExport: '没有可导出的数据',
          downloaded: '已开始下载',
          errExport: '导出失败',
          dash: '—',
          pageEmpty: '第 1 / 1 页 · 每页 {n} 条',
          pageOf: '第 {cur} / {tot} 页 · 每页 {n} 条',
          emailSummary: '（全部 {all} 条里 {ne} 条有邮箱）',
        },
      };

      let lang = localStorage.getItem(LANG_KEY) || 'en';
      if (lang !== 'en' && lang !== 'zh') lang = 'en';

      function T(key, vars) {
        let s = STR[lang][key] || STR.en[key] || key;
        if (vars) {
          Object.keys(vars).forEach((k) => {
            s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), String(vars[k]));
          });
        }
        return s;
      }

      function applyLang() {
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const k = el.getAttribute('data-i18n');
          if (k && STR[lang][k] != null) el.textContent = STR[lang][k];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
          const k = el.getAttribute('data-i18n-placeholder');
          if (k && STR[lang][k] != null) el.setAttribute('placeholder', STR[lang][k]);
        });
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langZh').classList.toggle('active', lang === 'zh');
        localStorage.setItem(LANG_KEY, lang);
        document.title =
          lang === 'zh' ? '达人检索 — YouTube 搜索' : 'Influencer Scout — YouTube search';
      }

      const searchMsg = document.getElementById('searchMsg');
      const tbody = document.getElementById('tbody');
      const resultsCard = document.getElementById('resultsCard');
      const btnExport = document.getElementById('btnExport');

      const PAGE_SIZE = 20;
      let lastVideos = [];
      let currentPage = 1;

      document.getElementById('langEn').onclick = () => {
        lang = 'en';
        applyLang();
        if (lastVideos.length) renderVideoRows();
      };
      document.getElementById('langZh').onclick = () => {
        lang = 'zh';
        applyLang();
        if (lastVideos.length) renderVideoRows();
      };

      async function api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
        const res = await fetch(path, { ...opts, headers });
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          return data;
        }
        if (!res.ok) throw new Error(res.statusText);
        return res;
      }

      function resetSearchUi() {
        lastVideos = [];
        currentPage = 1;
        const fe = document.getElementById('filterEmail');
        const ee = document.getElementById('exportEmailOnly');
        if (fe) fe.checked = false;
        if (ee) ee.checked = false;
        const bf = document.getElementById('badgeFiltered');
        if (bf) bf.classList.add('hidden');
        searchMsg.textContent = '';
        searchMsg.innerHTML = '';
        searchMsg.className = 'msg';
        const kw = document.getElementById('keyword');
        if (kw) kw.value = '';
        tbody.innerHTML = '';
        resultsCard.classList.add('hidden');
        document.getElementById('kwDisplay').textContent = '';
        document.getElementById('countDisplay').textContent = '0';
        const es = document.getElementById('emailSummary');
        if (es) es.textContent = '';
        const pm = document.getElementById('pageMeta');
        if (pm) pm.textContent = T('pageEmpty', { n: PAGE_SIZE });
      }

      function getFilteredVideos() {
        const list = lastVideos;
        if (!document.getElementById('filterEmail').checked) return list;
        return list.filter((r) => r.email && String(r.email).trim());
      }

      function countWithEmail(arr) {
        return arr.filter((r) => r.email && String(r.email).trim()).length;
      }

      function renderVideoRows() {
        const list = getFilteredVideos();
        const totalAll = lastVideos.length;
        const total = list.length;
        const totalPages = total === 0 ? 1 : Math.ceil(total / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * PAGE_SIZE;
        const slice = list.slice(start, start + PAGE_SIZE);

        document.getElementById('countDisplay').textContent = String(totalAll);
        const emailSummary = document.getElementById('emailSummary');
        if (emailSummary) {
          const ne = countWithEmail(lastVideos);
          emailSummary.textContent = totalAll
            ? T('emailSummary', { ne, all: totalAll })
            : '';
        }

        const filterOn = document.getElementById('filterEmail').checked;
        const badgeFiltered = document.getElementById('badgeFiltered');
        const filteredCountEl = document.getElementById('filteredCount');
        if (badgeFiltered && filteredCountEl) {
          filteredCountEl.textContent = String(total);
          badgeFiltered.classList.toggle('hidden', !filterOn);
        }

        const pm = document.getElementById('pageMeta');
        pm.textContent =
          total === 0
            ? T('pageEmpty', { n: PAGE_SIZE })
            : T('pageOf', { cur: currentPage, tot: totalPages, n: PAGE_SIZE });

        const prev = document.getElementById('btnPrevPage');
        const next = document.getElementById('btnNextPage');
        if (prev) prev.disabled = currentPage <= 1 || total === 0;
        if (next) next.disabled = currentPage >= totalPages || total === 0;

        tbody.innerHTML = '';
        const dash = T('dash');
        for (const r of slice) {
          const tr = document.createElement('tr');
          const title = r.videoTitle || '';
          const vurl = r.videoUrl || '';
          const chn = r.channelName || '';
          const curl = r.channelUrl || '';
          const em = r.email && String(r.email).trim() ? r.email : '';
          tr.innerHTML =
            '<td class="cell-clip" title="' +
            escapeAttr(title) +
            '">' +
            escapeHtml(title) +
            '</td><td class="cell-clip" title="' +
            escapeAttr(vurl) +
            '"><a class="cell-link" href="' +
            escapeAttr(vurl) +
            '" target="_blank" rel="noopener" title="' +
            escapeAttr(vurl) +
            '">' +
            escapeHtml(vurl) +
            '</a></td><td class="cell-clip" title="' +
            escapeAttr(chn) +
            '">' +
            escapeHtml(chn) +
            '</td><td class="cell-clip" title="' +
            escapeAttr(curl) +
            '"><a class="cell-link" href="' +
            escapeAttr(curl) +
            '" target="_blank" rel="noopener" title="' +
            escapeAttr(curl) +
            '">' +
            escapeHtml(curl) +
            '</a></td><td class="cell-clip" title="' +
            escapeAttr(em) +
            '">' +
            (em ? escapeHtml(em) : '<span style="color:#64748b">' + dash + '</span>') +
            '</td><td class="cell-clip">' +
            fmtSubs(r.subscribers) +
            '</td>';
          tbody.appendChild(tr);
        }

        btnExport.disabled = totalAll === 0;
      }

      (function normalizePath() {
        const path = location.pathname.replace(/\/$/, '') || '/';
        if (path === '/login' || path === '/app') {
          history.replaceState(null, '', '/');
        }
      })();

      applyLang();

      document.getElementById('keyword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('btnSearch').click();
      });

      function fmtSubs(n) {
        const dash = T('dash');
        if (n === '' || n == null) return dash;
        const x = Number(n);
        if (Number.isNaN(x)) return dash;
        const loc = lang === 'zh' ? 'zh-CN' : 'en-US';
        if (lang === 'zh') {
          if (x >= 1e8) return (x / 1e8).toFixed(2) + ' 亿';
          if (x >= 1e4) return (x / 1e4).toFixed(1) + ' 万';
        } else {
          if (x >= 1e9) return (x / 1e9).toFixed(2) + 'B';
          if (x >= 1e6) return (x / 1e6).toFixed(2) + 'M';
          if (x >= 1e3) return (x / 1e3).toFixed(1) + 'K';
        }
        return x.toLocaleString(loc);
      }

      document.getElementById('btnSearch').onclick = async () => {
        const q = document.getElementById('keyword').value.trim();
        searchMsg.innerHTML = '';
        searchMsg.className = 'msg';
        resultsCard.classList.add('hidden');
        lastVideos = [];
        currentPage = 1;

        if (!q) {
          searchMsg.textContent = T('errNeedKeyword');
          searchMsg.className = 'msg err';
          return;
        }

        const btn = document.getElementById('btnSearch');
        btn.disabled = true;
        searchMsg.innerHTML = '<span class="spinner"></span>' + T('searching');
        searchMsg.className = 'msg ok';

        try {
          const data = await api('/api/search?q=' + encodeURIComponent(q));
          lastVideos = data.videos || [];
          document.getElementById('kwDisplay').textContent = data.keyword || q;
          currentPage = 1;
          document.getElementById('filterEmail').checked = false;
          document.getElementById('exportEmailOnly').checked = false;
          renderVideoRows();
          resultsCard.classList.remove('hidden');
          searchMsg.textContent = data.message || T('done');
          searchMsg.className = 'msg ok';
        } catch (e) {
          searchMsg.textContent = e.message || T('errSearch');
          searchMsg.className = 'msg err';
        } finally {
          btn.disabled = false;
        }
      };

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
      }

      document.getElementById('filterEmail').addEventListener('change', () => {
        currentPage = 1;
        renderVideoRows();
      });

      document.getElementById('btnPrevPage').onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          renderVideoRows();
        }
      };

      document.getElementById('btnNextPage').onclick = () => {
        const list = getFilteredVideos();
        const tp = list.length === 0 ? 1 : Math.ceil(list.length / PAGE_SIZE);
        if (currentPage < tp) {
          currentPage++;
          renderVideoRows();
        }
      };

      btnExport.onclick = async () => {
        if (!lastVideos.length) return;
        const exportOnly = document.getElementById('exportEmailOnly').checked;
        let payload = lastVideos;
        if (exportOnly) {
          payload = lastVideos.filter((r) => r.email && String(r.email).trim());
        }
        if (!payload.length) {
          searchMsg.textContent = exportOnly ? T('errNoExportEmail') : T('errNoExport');
          searchMsg.className = 'msg err';
          return;
        }
        searchMsg.textContent = '';
        searchMsg.className = 'msg';
        try {
          const res = await fetch('/api/export', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ videos: payload }),
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            throw new Error(j.error || res.statusText);
          }
          const blob = await res.blob();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'youtube-videos.xlsx';
          a.click();
          URL.revokeObjectURL(a.href);
          searchMsg.textContent = T('downloaded');
          searchMsg.className = 'msg ok';
        } catch (e) {
          searchMsg.textContent = e.message || T('errExport');
          searchMsg.className = 'msg err';
        }
      };
    </script>
  </body>
</html>
