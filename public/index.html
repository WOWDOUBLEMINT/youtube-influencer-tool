<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Influencer Scout — YouTube search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://twotrees3d.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: #fde2ec;
        --page-bg2: #fce4f0;
        --ink: #0a0a0a;
        --muted: #4a4a4a;
        --card: #ffffff;
        --stroke: rgba(15, 23, 42, 0.08);
        --accent: #111111;
        --accent-soft: #f4f4f5;
        --danger: #be123c;
        --ok: #047857;
        --pill: #0a0a0a;
        --nav-border: rgba(255, 255, 255, 0.1);
        --nav-text: #f8fafc;
        --nav-muted: rgba(248, 250, 252, 0.65);
        --radius: 20px;
        --nav-h: 56px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'DM Sans', system-ui, sans-serif;
        color: var(--ink);
        background: var(--page-bg);
        background-image: radial-gradient(1200px 600px at 50% -10%, rgba(255, 255, 255, 0.65), transparent 55%),
          radial-gradient(900px 500px at 100% 40%, rgba(253, 186, 210, 0.45), transparent 50%),
          radial-gradient(700px 400px at 0% 80%, rgba(233, 213, 255, 0.35), transparent 45%);
      }

      .nav-shell {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 18px 16px 0;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      .nav-pill {
        pointer-events: auto;
        width: min(960px, calc(100% - 8px));
        min-height: var(--nav-h);
        padding: 8px 10px 8px 12px;
        background: var(--pill);
        border-radius: 999px;
        border: 1px solid var(--nav-border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 2px 12px rgba(0, 0, 0, 0.25);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 8px;
        overflow: visible;
      }

      .nav-left {
        justify-self: start;
        display: flex;
        align-items: center;
      }

      .nav-center {
        justify-self: center;
      }

      .nav-center-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 4px;
      }

      .nav-right {
        justify-self: end;
        padding-right: 6px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        position: relative;
        overflow: visible;
      }

      .route-view.hidden {
        display: none !important;
      }

      .history-page-section {
        min-height: calc(100vh - 72px);
        min-height: calc(100dvh - 72px);
        padding: calc(var(--nav-h) + 36px) 0 72px;
      }

      .history-page-inner {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 22px;
      }

      .history-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--ink);
        text-decoration: none;
        margin-bottom: 22px;
        padding: 8px 0;
      }

      .history-back:hover {
        text-decoration: underline;
      }

      .history-page-head {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .history-page-title {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(1.5rem, 4vw, 2rem);
        letter-spacing: -0.02em;
        margin: 0;
        color: var(--ink);
        flex: 1;
        min-width: min(100%, 200px);
      }

      .btn-clear-history {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        padding: 9px 16px;
        border-radius: 999px;
        border: 1px solid rgba(190, 18, 60, 0.4);
        background: rgba(255, 255, 255, 0.95);
        color: var(--danger);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        flex-shrink: 0;
      }

      .btn-clear-history:hover:not(:disabled) {
        background: #fff1f2;
        border-color: rgba(190, 18, 60, 0.55);
      }

      .btn-clear-history:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .history-page-lead {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.6;
        max-width: 40rem;
      }

      .history-page-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .history-card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        padding: 16px 18px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .history-card-main {
        flex: 1;
        min-width: min(100%, 200px);
      }

      .history-card-kw {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 800;
        font-size: 1.05rem;
        color: var(--ink);
        line-height: 1.3;
        word-break: break-word;
      }

      .history-card-meta {
        margin-top: 6px;
        font-size: 0.84rem;
        color: var(--muted);
        font-weight: 500;
      }

      .history-card-count {
        font-size: 0.78rem;
        color: #64748b;
        font-weight: 600;
        margin-top: 4px;
      }

      .btn-history-open {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: var(--ink);
        color: #fff;
        transition: transform 0.12s, box-shadow 0.2s;
        flex-shrink: 0;
      }

      .btn-history-open:hover {
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      }

      .btn-history-open:active {
        transform: scale(0.98);
      }

      .history-empty-card {
        padding: 28px 22px;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.55;
      }

      .nav-logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border-radius: 14px;
        padding: 6px 10px 6px 4px;
        line-height: 0;
      }

      .nav-logo-link {
        border-radius: 10px;
        outline-offset: 3px;
      }

      .nav-logo-link:focus-visible {
        outline: 2px solid rgba(96, 165, 250, 0.95);
      }

      .nav-logo {
        height: 26px;
        width: auto;
        max-width: min(160px, 36vw);
        object-fit: contain;
        object-position: left center;
        display: block;
      }

      @media (min-width: 480px) {
        .nav-logo {
          height: 30px;
          max-width: 180px;
        }
      }

      .nav-main-link {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--nav-text);
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 999px;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .nav-main-link:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--nav-text);
      }

      .lang-toggle {
        display: inline-flex;
        padding: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--nav-border);
        gap: 2px;
      }

      .lang-btn {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.78rem;
        padding: 8px 12px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        background: transparent;
        color: var(--nav-muted);
        transition: background 0.2s, color 0.2s;
      }

      .lang-btn:hover {
        color: var(--nav-text);
      }

      .lang-btn.active {
        background: #fff;
        color: #0a0a0a;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .hero {
        min-height: 90vh;
        min-height: 90dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: calc(var(--nav-h) + 48px) 22px 48px;
        position: relative;
        overflow: hidden;
      }

      .hero-deco {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .hero-pill {
        position: absolute;
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 8px 14px;
        border-radius: 999px;
        color: #fff;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      .hero-pill--a {
        top: 22%;
        left: 8%;
        background: linear-gradient(135deg, #7c3aed, #5b21b6);
        transform: rotate(-8deg);
      }

      .hero-pill--b {
        top: 28%;
        right: 10%;
        background: linear-gradient(135deg, #db2777, #9d174d);
        transform: rotate(6deg);
      }

      .hero-pill--c {
        bottom: 38%;
        left: 14%;
        background: linear-gradient(135deg, #ea580c, #c2410c);
        transform: rotate(5deg);
      }

      @media (max-width: 640px) {
        .hero-pill {
          display: none;
        }
      }

      .hero-title {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(2.1rem, 7vw, 4.25rem);
        line-height: 0.98;
        letter-spacing: -0.03em;
        text-transform: uppercase;
        color: var(--ink);
        margin: 0;
        max-width: 20ch;
        position: relative;
        z-index: 1;
        white-space: pre-line;
      }

      @media (min-width: 768px) {
        .hero-title {
          max-width: 24ch;
          font-size: clamp(2.75rem, 6.5vw, 4.6rem);
        }
      }

      .hero-sub {
        margin: 28px 0 0;
        max-width: 36rem;
        font-size: clamp(0.95rem, 2.1vw, 1.15rem);
        line-height: 1.65;
        color: var(--muted);
        font-weight: 500;
        position: relative;
        z-index: 1;
      }

      .hero-scroll {
        margin-top: 40px;
        position: relative;
        z-index: 1;
      }

      .hero-scroll-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink);
        text-decoration: none;
        padding: 14px 26px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        transition: transform 0.15s, box-shadow 0.2s;
      }

      .hero-scroll-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.22);
      }

      .hero-scroll-link:active {
        transform: translateY(0);
      }

      .search-panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.92) 12%, #fff 100%);
        border-radius: 32px 32px 0 0;
        border-top: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 -20px 60px rgba(15, 23, 42, 0.06);
        padding: 48px 0 72px;
        margin-top: -8px;
      }

      .wrap {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 22px;
      }

      .panel-title {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(1.35rem, 3vw, 1.75rem);
        letter-spacing: -0.02em;
        margin: 0 0 8px;
        color: var(--ink);
      }

      .panel-lead {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0 0 28px;
        max-width: 40rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.05);
        padding: 26px 26px 22px;
        margin-bottom: 22px;
      }

      label {
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 8px;
        font-weight: 700;
      }

      input[type='text'] {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fafafa;
        color: var(--ink);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      input::placeholder {
        color: #9ca3af;
      }

      input:focus {
        border-color: var(--ink);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
      }

      .search-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: flex-end;
      }

      .search-row .grow {
        flex: 1;
        min-width: min(100%, 240px);
      }

      .search-row .actions {
        margin-top: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 700;
        border: none;
        border-radius: 999px;
        padding: 13px 26px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--ink);
        color: #fff;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      }

      .btn-primary:hover:not(:disabled) {
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      }

      .btn-ghost {
        background: #fff;
        color: var(--ink);
        border: 1px solid rgba(15, 23, 42, 0.12);
      }

      .btn-ghost:hover:not(:disabled) {
        background: #f4f4f5;
      }

      .btn-export {
        background: linear-gradient(135deg, #047857, #0d9488);
        color: #fff;
      }

      .btn-export:hover:not(:disabled) {
        box-shadow: 0 4px 14px rgba(4, 120, 87, 0.35);
      }

      .btn-sm {
        padding: 8px 16px;
        font-size: 0.85rem;
      }

      .msg {
        margin-top: 12px;
        font-size: 0.9rem;
        min-height: 1.2em;
      }

      .msg.err {
        color: var(--danger);
      }

      .msg.ok {
        color: var(--ok);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 0.8rem;
        color: var(--muted);
        border: 1px solid var(--stroke);
        background: #fafafa;
      }

      .badge strong {
        color: var(--ink);
        font-weight: 800;
      }

      .badges-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 14px;
      }

      .list-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        padding: 12px 14px;
        background: #fafafa;
        border: 1px solid var(--stroke);
        border-radius: 14px;
      }

      .list-toolbar-left {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 18px;
      }

      .filter-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        color: var(--ink);
        cursor: pointer;
        user-select: none;
      }

      .filter-label input {
        width: 16px;
        height: 16px;
        accent-color: var(--ink);
      }

      .pager-below {
        display: flex;
        justify-content: center;
        margin-top: 16px;
      }

      .pager {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .page-meta {
        font-size: 0.88rem;
        color: var(--muted);
        min-width: 8rem;
        text-align: center;
      }

      .list-muted {
        font-size: 0.82rem;
        color: var(--muted);
        white-space: nowrap;
      }

      .table-scroll {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--stroke);
        border-radius: 14px;
        background: #fff;
      }

      table.result-table {
        table-layout: fixed;
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      table.result-table th,
      table.result-table td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--stroke);
        vertical-align: middle;
      }

      table.result-table th {
        color: var(--muted);
        font-weight: 700;
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: #fafafa;
      }

      tbody tr:hover {
        background: #fafafa;
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      .cell-clip {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }

      table.result-table td a.cell-link {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        word-break: normal;
      }

      .hidden {
        display: none !important;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #e5e7eb;
        border-top-color: var(--ink);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .cache-tags-wrap {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--stroke);
      }

      .cache-tags-label {
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .cache-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .cache-tag {
        font-family: Outfit, system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.82rem;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fafafa;
        color: var(--ink);
        cursor: pointer;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: background 0.15s, border-color 0.15s, transform 0.12s;
      }

      .cache-tag:hover {
        background: #fff;
        border-color: rgba(15, 23, 42, 0.22);
      }

      .cache-tag:active {
        transform: scale(0.98);
      }

      .results-head {
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <header class="nav-shell">
      <nav class="nav-pill" aria-label="Main navigation">
        <div class="nav-left">
          <a class="nav-logo-link" href="#/" title="Two Trees">
            <span class="nav-logo-wrap">
              <img
                class="nav-logo"
                src="https://twotrees3d.com/cdn/shop/files/logo_1c806b7f-262b-463d-826b-790ffb4882b4.png?v=1751007669&amp;width=500"
                width="200"
                height="54"
                alt="Two Trees"
                decoding="async"
                fetchpriority="high"
              />
            </span>
          </a>
        </div>
        <div class="nav-center">
          <div class="nav-center-inner">
            <a class="nav-main-link" href="#/" data-i18n="navHome">Home</a>
            <a class="nav-main-link" href="#/history" id="navHistoryLink" data-i18n="navHistory">History</a>
          </div>
        </div>
        <div class="nav-right">
          <div class="lang-toggle" role="group" aria-label="Language">
            <button type="button" class="lang-btn active" data-set-lang="en" id="langEn">EN</button>
            <button type="button" class="lang-btn" data-set-lang="zh" id="langZh">中文</button>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <div id="routeHome" class="route-view">
      <section class="hero" id="hero">
        <div class="hero-deco" aria-hidden="true">
          <span class="hero-pill hero-pill--a">Creator</span>
          <span class="hero-pill hero-pill--b">Scout</span>
          <span class="hero-pill hero-pill--c">Growth</span>
        </div>
        <h1 class="hero-title" data-i18n="heroTitle"></h1>
        <p class="hero-sub" data-i18n="heroSub"></p>
        <div class="hero-scroll">

    <script>
      const LANG_KEY = 'influencer_lang';

      const STR = {

          colSubs: '粉丝数',

          done: '检索完成',
          errSearch: '搜索失败',
          errNoExportEmail: '没有含邮箱的记录可导出',
          errNoExport: '没有可导出的数据',
          downloaded: '已开始下载',
          errExport: '导出失败',
          dash: '—',
          pageEmpty: '第 1 / 1 页 · 每页 {n} 条',
          pageOf: '第 {cur} / {tot} 页 · 每页 {n} 条',
          emailSummary: '（全部 {all} 条里 {ne} 条有邮箱）',
          cacheTagsLabel: '今日已缓存的关键词',
          fromCache: '已使用今日本地缓存，未请求接口。',
        },
      };

      let lang = localStorage.getItem(LANG_KEY) || 'en';
      if (lang !== 'en' && lang !== 'zh') lang = 'en';

      function T(key, vars) {
        let s = STR[lang][key] || STR.en[key] || key;
        if (vars) {
          Object.keys(vars).forEach((k) => {
            s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), String(vars[k]));
          });
        }
        return s;
      }

      function applyLang() {
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        document.querySelectorAll('[data-i18n]').forEach((el) => {
          const k = el.getAttribute('data-i18n');
          if (k && STR[lang][k] != null) el.textContent = STR[lang][k];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
          const k = el.getAttribute('data-i18n-placeholder');
          if (k && STR[lang][k] != null) el.setAttribute('placeholder', STR[lang][k]);
        });
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langZh').classList.toggle('active', lang === 'zh');
        localStorage.setItem(LANG_KEY, lang);
        document.title =
          lang === 'zh' ? '达人检索 — YouTube 搜索' : 'Influencer Scout — YouTube search';
        renderCacheTags();
        renderHistoryPage();
      }

      const searchMsg = document.getElementById('searchMsg');
      const tbody = document.getElementById('tbody');
      const resultsCard = document.getElementById('resultsCard');
      const btnExport = document.getElementById('btnExport');

      const PAGE_SIZE = 20;
      let lastVideos = [];
      let currentPage = 1;

      const CACHE_STORAGE_KEY = 'influencer_search_day_cache_v1';
      const CACHE_MAX_ENTRIES = 20;

      function localCalendarDay() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
      }

      function normalizeCacheKey(q) {
        return String(q || '')
          .trim()
          .replace(/\s+/g, ' ')
          .toLowerCase();
      }

      function loadDayCache() {
        try {
          const raw = localStorage.getItem(CACHE_STORAGE_KEY);
          if (!raw) return { day: localCalendarDay(), byKey: {} };
          const o = JSON.parse(raw);
          if (!o || typeof o !== 'object') return { day: localCalendarDay(), byKey: {} };
          if (o.day !== localCalendarDay()) return { day: localCalendarDay(), byKey: {} };
          return { day: o.day, byKey: o.byKey && typeof o.byKey === 'object' ? o.byKey : {} };
        } catch {
          return { day: localCalendarDay(), byKey: {} };
        }
      }

      function pruneOldestEntries(byKey, maxKeep) {
        const keys = Object.keys(byKey);
        if (keys.length <= maxKeep) return byKey;
        const ranked = keys
          .map((k) => ({ k, at: Number(byKey[k].at) || 0 }))
          .sort((a, b) => a.at - b.at);
        const drop = keys.length - maxKeep;
        for (let i = 0; i < drop; i++) delete byKey[ranked[i].k];
        return byKey;
      }

      function persistDayCache(data) {
        const payload = JSON.stringify({ day: data.day, byKey: data.byKey });
        try {
          localStorage.setItem(CACHE_STORAGE_KEY, payload);
        } catch (e) {
          if (e && e.name === 'QuotaExceededError') {
            pruneOldestEntries(data.byKey, Math.max(3, Math.floor(CACHE_MAX_ENTRIES / 2)));
            try {
              localStorage.setItem(CACHE_STORAGE_KEY, JSON.stringify({ day: data.day, byKey: data.byKey }));
            } catch (_) {}
          }
        }
      }

      function writeCacheEntry(keyNorm, entry) {
        const data = loadDayCache();
        data.day = localCalendarDay();
        data.byKey[keyNorm] = {
          keywordDisplay: entry.keywordDisplay,
          videos: Array.isArray(entry.videos) ? entry.videos : [],
          message: entry.message || '',
          at: Date.now(),
        };
        pruneOldestEntries(data.byKey, CACHE_MAX_ENTRIES);
        persistDayCache(data);
      }

      function readCacheEntry(keyNorm) {
        const data = loadDayCache();
        const hit = data.byKey[keyNorm];
        if (!hit || !Array.isArray(hit.videos)) return null;
        return hit;
      }

      function renderCacheTags() {
        const wrap = document.getElementById('cacheTagsWrap');
        const row = document.getElementById('cacheTags');
        if (!wrap || !row) return;
        const data = loadDayCache();
        const pairs = Object.entries(data.byKey);
        if (!pairs.length) {
          wrap.classList.add('hidden');
          row.innerHTML = '';
          return;
        }
        wrap.classList.remove('hidden');
        pairs.sort((a, b) => (Number(b[1].at) || 0) - (Number(a[1].at) || 0));
        row.innerHTML = '';
        for (const [k, v] of pairs) {
          const label = (v.keywordDisplay || k || '').trim();
          if (!label) continue;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'cache-tag';
          btn.textContent = label;
          btn.setAttribute('aria-label', label);
          btn.onclick = () => {
            document.getElementById('keyword').value = label;
            document.getElementById('btnSearch').click();
          };
          row.appendChild(btn);
        }
      }

      const HISTORY_STORAGE_KEY = 'influencer_search_history_v1';
      const HISTORY_MAX_ITEMS = 40;

      function cloneVideosForHistory(videos) {
        try {
          if (typeof structuredClone === 'function') return structuredClone(videos);
        } catch (_) {}
        return JSON.parse(JSON.stringify(videos));
      }

      function loadHistoryItems() {
        try {
          const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
          if (!raw) return [];
          const arr = JSON.parse(raw);
          if (!Array.isArray(arr)) return [];
          return arr.filter(
            (x) => x && x.id && typeof x.keyword === 'string' && Array.isArray(x.videos) && x.videos.length > 0
          );
        } catch {
          return [];
        }
      }

      function persistHistoryItems(items) {
        const trimmed = items.slice(0, HISTORY_MAX_ITEMS);
        try {
          localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(trimmed));
        } catch (e) {
          if (e && e.name === 'QuotaExceededError' && trimmed.length > 4) {
            persistHistoryItems(trimmed.slice(0, Math.floor(trimmed.length / 2)));
          }
        }
      }

      function appendHistoryEntry({ keyword, videos }) {
        if (!keyword || !Array.isArray(videos) || !videos.length) return;
        const items = loadHistoryItems();
        items.unshift({
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`,
          keyword,
          at: Date.now(),
          videos: cloneVideosForHistory(videos),
        });
        persistHistoryItems(items);
        renderHistoryPage();
      }

      function formatHistoryDate(ts) {
        const d = new Date(Number(ts) || 0);
        if (lang === 'zh') {
          return d.toLocaleString('zh-CN', { dateStyle: 'medium', timeStyle: 'short' });
        }
        return d.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
      }

      function parseHashRoute() {
        let raw = (location.hash || '').replace(/^#/, '').trim();
        if (raw.startsWith('/')) raw = raw.slice(1).trim();
        if (!raw) return { route: 'home', scrollSearch: false };
        if (raw === 'history') return { route: 'history', scrollSearch: false };
        if (raw === 'search') return { route: 'home', scrollSearch: true };
        if (raw === 'home') return { route: 'home', scrollSearch: false };
        return { route: 'home', scrollSearch: false };
      }

      function syncRoute() {
        const { route, scrollSearch } = parseHashRoute();
        const home = document.getElementById('routeHome');
        const hist = document.getElementById('routeHistory');
        if (!home || !hist) return;
        if (route === 'history') {
          home.classList.add('hidden');
          hist.classList.remove('hidden');
          renderHistoryPage();
          window.scrollTo(0, 0);
        } else {
          hist.classList.add('hidden');
          home.classList.remove('hidden');
          if (scrollSearch) {
            queueMicrotask(() => {
              document.getElementById('search')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          }
        }
      }

      function applyHistoryEntry(id) {
        const entry = loadHistoryItems().find((x) => x.id === id);
        if (!entry || !Array.isArray(entry.videos)) return;
        lastVideos = cloneVideosForHistory(entry.videos);
        const kw = entry.keyword || '';
        document.getElementById('keyword').value = kw;
        document.getElementById('kwDisplay').textContent = kw;
        currentPage = 1;
        document.getElementById('filterEmail').checked = false;
        document.getElementById('exportEmailOnly').checked = false;
        renderVideoRows();
        resultsCard.classList.remove('hidden');
        searchMsg.textContent = T('loadedFromHistory');
        searchMsg.className = 'msg ok';
        if (parseHashRoute().route === 'history') {
          location.hash = '#/search';
        } else {
          document.getElementById('search')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      function renderHistoryPage() {
        const listEl = document.getElementById('historyPageList');
        const emptyWrap = document.getElementById('historyPageEmptyWrap');
        const clearBtn = document.getElementById('btnClearAllHistory');
        if (!listEl || !emptyWrap) return;
        const items = loadHistoryItems();
        listEl.innerHTML = '';
        if (clearBtn) clearBtn.disabled = items.length === 0;
        if (!items.length) {
          emptyWrap.classList.remove('hidden');
          return;
        }
        emptyWrap.classList.add('hidden');
        for (const item of items) {
          const card = document.createElement('div');
          card.className = 'history-card';
          const main = document.createElement('div');
          main.className = 'history-card-main';
          const kwEl = document.createElement('div');
          kwEl.className = 'history-card-kw';
          kwEl.textContent = item.keyword || '';
          const meta = document.createElement('div');
          meta.className = 'history-card-meta';
          meta.textContent = formatHistoryDate(item.at);
          const cnt = document.createElement('div');
          cnt.className = 'history-card-count';
          cnt.textContent = T('historyCount', { n: item.videos.length });
          main.appendChild(kwEl);
          main.appendChild(meta);
          main.appendChild(cnt);
          const openBtn = document.createElement('button');
          openBtn.type = 'button';
          openBtn.className = 'btn-history-open';
          openBtn.textContent = T('historyOpenBtn');
          openBtn.onclick = () => applyHistoryEntry(item.id);
          card.appendChild(main);
          card.appendChild(openBtn);
          listEl.appendChild(card);
        }
      }

      function clearAllSearchHistory() {
        const items = loadHistoryItems();
        if (!items.length) return;
        if (!confirm(T('historyClearConfirm'))) return;
        try {
          localStorage.removeItem(HISTORY_STORAGE_KEY);
        } catch (_) {
          persistHistoryItems([]);
        }
        renderHistoryPage();
      }

      document.getElementById('btnClearAllHistory').onclick = () => clearAllSearchHistory();

      document.getElementById('langEn').onclick = () => {
        lang = 'en';
        applyLang();
        if (lastVideos.length) renderVideoRows();
      };
      document.getElementById('langZh').onclick = () => {
        lang = 'zh';
        applyLang();
        if (lastVideos.length) renderVideoRows();
      };

      async function api(path, opts = {}) {
        const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
        const res = await fetch(path, { ...opts, headers });
        const ct = res.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || res.statusText);
          return data;
        }
        if (!res.ok) throw new Error(res.statusText);
        return res;
      }

      function resetSearchUi() {
        lastVideos = [];
        currentPage = 1;
        const fe = document.getElementById('filterEmail');
        const ee = document.getElementById('exportEmailOnly');
        if (fe) fe.checked = false;
        if (ee) ee.checked = false;
        const bf = document.getElementById('badgeFiltered');
        if (bf) bf.classList.add('hidden');
        searchMsg.textContent = '';
        searchMsg.innerHTML = '';
        searchMsg.className = 'msg';
        const kw = document.getElementById('keyword');
        if (kw) kw.value = '';
        tbody.innerHTML = '';
        resultsCard.classList.add('hidden');
        document.getElementById('kwDisplay').textContent = '';
        document.getElementById('countDisplay').textContent = '0';
        const es = document.getElementById('emailSummary');
        if (es) es.textContent = '';
        const pm = document.getElementById('pageMeta');
        if (pm) pm.textContent = T('pageEmpty', { n: PAGE_SIZE });
      }

      function getFilteredVideos() {
        const list = lastVideos;
        if (!document.getElementById('filterEmail').checked) return list;
        return list.filter((r) => r.email && String(r.email).trim());
      }

      function countWithEmail(arr) {
        return arr.filter((r) => r.email && String(r.email).trim()).length;
      }

      function renderVideoRows() {
        const list = getFilteredVideos();
        const totalAll = lastVideos.length;
        const total = list.length;
        const totalPages = total === 0 ? 1 : Math.ceil(total / PAGE_SIZE);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * PAGE_SIZE;
        const slice = list.slice(start, start + PAGE_SIZE);

        document.getElementById('countDisplay').textContent = String(totalAll);
        const emailSummary = document.getElementById('emailSummary');
        if (emailSummary) {
          const ne = countWithEmail(lastVideos);
          emailSummary.textContent = totalAll
            ? T('emailSummary', { ne, all: totalAll })
            : '';
        }

        const filterOn = document.getElementById('filterEmail').checked;
        const badgeFiltered = document.getElementById('badgeFiltered');
        const filteredCountEl = document.getElementById('filteredCount');
        if (badgeFiltered && filteredCountEl) {
          filteredCountEl.textContent = String(total);
          badgeFiltered.classList.toggle('hidden', !filterOn);
        }

        const pm = document.getElementById('pageMeta');
        pm.textContent =
          total === 0
            ? T('pageEmpty', { n: PAGE_SIZE })
            : T('pageOf', { cur: currentPage, tot: totalPages, n: PAGE_SIZE });

        const prev = document.getElementById('btnPrevPage');
        const next = document.getElementById('btnNextPage');
        if (prev) prev.disabled = currentPage <= 1 || total === 0;
        if (next) next.disabled = currentPage >= totalPages || total === 0;

        tbody.innerHTML = '';
        const dash = T('dash');
        for (const r of slice) {
          const tr = document.createElement('tr');
          const title = r.videoTitle || '';
          const vurl = r.videoUrl || '';
          const chn = r.channelName || '';
          const curl = r.channelUrl || '';
          const em = r.email && String(r.email).trim() ? r.email : '';
          tr.innerHTML =
            '<td class="cell-clip" title="' +
            escapeAttr(title) +
            '">' +
            escapeHtml(title) +
            '</td><td class="cell-clip" title="' +
            escapeAttr(vurl) +
            '"><a class="cell-link" href="' +
            escapeAttr(vurl) +
            '" target="_blank" rel="noopener" title="' +
            escapeAttr(vurl) +
            '">' +
            escapeHtml(vurl) +
            '</a></td><td class="cell-clip" title="' +
            escapeAttr(chn) +
            '">' +
            escapeHtml(chn) +
            '</td><td class="cell-clip" title="' +
            escapeAttr(curl) +
            '"><a class="cell-link" href="' +
            escapeAttr(curl) +
            '" target="_blank" rel="noopener" title="' +
            escapeAttr(curl) +
            '">' +
            escapeHtml(curl) +
            '</a></td><td class="cell-clip" title="' +
            escapeAttr(em) +
            '">' +
            (em ? escapeHtml(em) : '<span style="color:#64748b">' + dash + '</span>') +
            '</td><td class="cell-clip">' +
            fmtSubs(r.subscribers) +
            '</td>';
          tbody.appendChild(tr);
        }

        btnExport.disabled = totalAll === 0;
      }

      (function normalizePath() {
        const path = location.pathname.replace(/\/$/, '') || '/';
        if (path === '/login' || path === '/app') {
          history.replaceState(null, '', '/');
        }
      })();

      if (!location.hash || location.hash === '#') {
        history.replaceState(null, '', '#/');
      }

      window.addEventListener('hashchange', syncRoute);

      applyLang();
      syncRoute();

      document.getElementById('keyword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('btnSearch').click();
      });

      function fmtSubs(n) {
        const dash = T('dash');
        if (n === '' || n == null) return dash;
        const x = Number(n);
        if (Number.isNaN(x)) return dash;
        const loc = lang === 'zh' ? 'zh-CN' : 'en-US';
        if (lang === 'zh') {
          if (x >= 1e8) return (x / 1e8).toFixed(2) + ' 亿';
          if (x >= 1e4) return (x / 1e4).toFixed(1) + ' 万';
        } else {
          if (x >= 1e9) return (x / 1e9).toFixed(2) + 'B';
          if (x >= 1e6) return (x / 1e6).toFixed(2) + 'M';
          if (x >= 1e3) return (x / 1e3).toFixed(1) + 'K';
        }
        return x.toLocaleString(loc);
      }

      document.getElementById('btnSearch').onclick = async () => {
        const q = document.getElementById('keyword').value.trim();
        searchMsg.innerHTML = '';
        searchMsg.className = 'msg';
        resultsCard.classList.add('hidden');
        lastVideos = [];
        currentPage = 1;

        if (!q) {
          searchMsg.textContent = T('errNeedKeyword');
          searchMsg.className = 'msg err';
          return;
        }

        const btn = document.getElementById('btnSearch');
        const keyNorm = normalizeCacheKey(q);
        const cached = readCacheEntry(keyNorm);
        if (cached) {
          lastVideos = cached.videos;
          document.getElementById('kwDisplay').textContent = cached.keywordDisplay || q;
          currentPage = 1;
          document.getElementById('filterEmail').checked = false;
          document.getElementById('exportEmailOnly').checked = false;
          renderVideoRows();
          resultsCard.classList.remove('hidden');
          searchMsg.textContent = T('fromCache');
          searchMsg.className = 'msg ok';
          renderCacheTags();
          return;
        }

        btn.disabled = true;
        searchMsg.innerHTML = '<span class="spinner"></span>' + T('searching');
        searchMsg.className = 'msg ok';

        try {
          const data = await api('/api/search?q=' + encodeURIComponent(q));
          lastVideos = data.videos || [];
          const displayKw = data.keyword || q;
          document.getElementById('kwDisplay').textContent = displayKw;
          currentPage = 1;
          document.getElementById('filterEmail').checked = false;
          document.getElementById('exportEmailOnly').checked = false;
          renderVideoRows();
          resultsCard.classList.remove('hidden');
          searchMsg.textContent = data.message || T('done');
          searchMsg.className = 'msg ok';
          writeCacheEntry(keyNorm, {
            keywordDisplay: displayKw,
            videos: lastVideos,
            message: data.message || '',
          });
          renderCacheTags();
          if (lastVideos.length > 0) {
            appendHistoryEntry({ keyword: displayKw, videos: lastVideos });
          }
        } catch (e) {
          searchMsg.textContent = e.message || T('errSearch');
          searchMsg.className = 'msg err';
        } finally {
          btn.disabled = false;
        }
      };

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
      }

      document.getElementById('filterEmail').addEventListener('change', () => {
        currentPage = 1;
        renderVideoRows();
      });

      document.getElementById('btnPrevPage').onclick = () => {
        if (currentPage > 1) {
          currentPage--;
          renderVideoRows();
        }
      };

      document.getElementById('btnNextPage').onclick = () => {
        const list = getFilteredVideos();
        const tp = list.length === 0 ? 1 : Math.ceil(list.length / PAGE_SIZE);
        if (currentPage < tp) {
          currentPage++;
          renderVideoRows();
        }
      };

      btnExport.onclick = async () => {
        if (!lastVideos.length) return;
        const exportOnly = document.getElementById('exportEmailOnly').checked;
        let payload = lastVideos;
        if (exportOnly) {
          payload = lastVideos.filter((r) => r.email && String(r.email).trim());
        }
        if (!payload.length) {
          searchMsg.textContent = exportOnly ? T('errNoExportEmail') : T('errNoExport');
          searchMsg.className = 'msg err';
          return;
        }
        searchMsg.textContent = '';
        searchMsg.className = 'msg';
        try {
          const res = await fetch('/api/export', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ videos: payload }),
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            throw new Error(j.error || res.statusText);
          }
          const blob = await res.blob();
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'youtube-videos.xlsx';
          a.click();
          URL.revokeObjectURL(a.href);
          searchMsg.textContent = T('downloaded');
          searchMsg.className = 'msg ok';
        } catch (e) {
          searchMsg.textContent = e.message || T('errExport');
          searchMsg.className = 'msg err';
        }
      };
    </script>
  </body>
</html>
